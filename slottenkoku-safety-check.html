<script>
(function(){
  var popup=document.getElementById('slottenkokuPopup');
  if(!popup){return;}
  var key='slottenkoku_popup_closed_until';
  var now=Date.now();
  var closedUntil=parseInt(localStorage.getItem(key)||'0',10);
  var closeButton=popup.querySelector('.slottenkoku-popup-close');
  function openPopup(){popup.classList.add('is-active');popup.setAttribute('aria-hidden','false');}
  function closePopup(){popup.classList.remove('is-active');popup.setAttribute('aria-hidden','true');localStorage.setItem(key,String(Date.now()+24*60*60*1000));}
  if(!closedUntil||closedUntil<now){setTimeout(openPopup,3000);}
  if(closeButton){closeButton.addEventListener('click',closePopup);}
  popup.addEventListener('click',function(e){if(e.target===popup){closePopup();}});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&popup.classList.contains('is-active')){closePopup();}});
})();
</script>
